name: Release

# Builds and packages every front-end on version tags, then publishes the
# artifacts to a GitHub Release:
#   Linux   : portable .tar.gz, .deb, .rpm, AppImage
#   Windows : portable .zip, NSIS .exe
# All packages bundle the CLI/daemon; the desktop launcher + tray are an opt-in
# component in the NSIS installer and bundled in every other artifact.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish a release for (e.g. v0.0.1). Empty = build artifacts only.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  package:
    name: package (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            cache: ccache
          - os: windows-latest
            platform: windows
            cache: ''
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      # .deb/.rpm install under /usr; the desktop .desktop entry and postinst
      # both assume that prefix.
      - uses: ./.github/actions/setup
        with:
          cache-variant: ${{ matrix.cache }}
          cache-key: release
          extra-cmake-args: -DCMAKE_INSTALL_PREFIX=/usr

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: sudo apt-get install -y --no-install-recommends rpm file

      - name: Install Windows packaging tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install --no-progress -y nsis
          # EnVar plugin: lets the installer add the CLI to PATH without hitting
          # NSIS's built-in string-length limit. Drop the DLL in the plugins dir.
          $zip = "$env:RUNNER_TEMP\envar.zip"
          Invoke-WebRequest -Uri "https://nsis.sourceforge.io/mediawiki/images/7/7f/EnVar_plugin.zip" -OutFile $zip
          $dst = "C:\Program Files (x86)\NSIS\Plugins"
          Expand-Archive -Path $zip -DestinationPath "$env:RUNNER_TEMP\envar" -Force
          Copy-Item "$env:RUNNER_TEMP\envar\Plugins\*" -Destination $dst -Recurse -Force

      - name: Package (Linux)
        if: runner.os == 'Linux'
        env:
          APPIMAGE_EXTRACT_AND_RUN: '1'
        run: |
          mkdir -p artifacts
          cmake -DBUILD_DIR=build -DOUT_DIR="$PWD/artifacts" -DSOURCE_DIR="$PWD" \
                -P cmake/package_portable.cmake
          (cd build && cpack -G "DEB;RPM")
          mv build/hestia*.deb build/hestia*.rpm artifacts/

          tools="$RUNNER_TEMP/tools"; mkdir -p "$tools"
          curl -fsSL -o "$tools/linuxdeploy" \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -fsSL -o "$tools/appimagetool" \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x "$tools/linuxdeploy" "$tools/appimagetool"
          PATH="$tools:$PATH" packaging/appimage/build-appimage.sh build artifacts

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir artifacts
          cmake -DBUILD_DIR=build -DOUT_DIR="$PWD/artifacts" -DSOURCE_DIR="$PWD" `
                -P cmake/package_portable.cmake
          cd build
          cpack -G NSIS
          Move-Item hestia-*.exe ../artifacts/

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hestia-${{ matrix.platform }}
          path: artifacts/*

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || inputs.tag != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: artifacts/*
          fail_on_unmatched_files: true
